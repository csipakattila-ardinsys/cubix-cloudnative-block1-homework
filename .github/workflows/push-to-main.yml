name: Maven package publish, Docker image publish
on:
  push:
    branches:
      - main
jobs:
  maven-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        cache: 'maven'      
    - name: Maven deploy
      run: mvn --batch-mode verify
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - name: Upload artifact for Docker job
      uses: actions/upload-artifact@v6
      with:
        name: java-app
        path: '${{ github.workspace }}/target/*.jar'
  docker-publish:
    runs-on: ubuntu-latest
    needs: maven-package
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Download artifact from maven job
      uses: actions/download-artifact@v6
      with:
        name: java-app
    - name: Logging in to Docker
      run: docker login ghcr.io -u csipakattila-ardinsys -p ${{ github.token }}
    - name: Build the Docker image
      run: docker build . --tag ghcr.io/csipakattila-ardinsys/cubix/1/homework/app:springboot
    - name: Publishing the Docker image
      run: docker push ghcr.io/csipakattila-ardinsys/cubix/1/homework/app:springboot
  docker-verify:
    runs-on: ubuntu-latest
    needs: docker-publish
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
    - name: Docker verify script
      run: '${{ github.workspace }}/verify-image.sh'
